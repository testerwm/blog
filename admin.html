<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leo Wang's Blog 创作者后台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-role="creator">
    <header class="site-header">
      <div class="wrap header-inner">
        <a class="brand" href="index.html" aria-label="返回博客">Leo Wang's Blog</a>
        <nav class="nav" aria-label="后台导航">
          <a class="nav-pill" href="index.html">公开页</a>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换深浅色主题">暗色</button>
          <button class="nav-pill hidden" id="logoutButton" type="button">退出</button>
        </nav>
      </div>
    </header>

    <main>
      <section class="wrap auth-section" id="authGate">
        <div class="section-title">
          <p class="eyebrow">Login</p>
          <h2>创作者登录</h2>
        </div>
        <form class="editor-form auth-form" id="loginForm">
          <label>
            <span>Email</span>
            <input id="loginEmail" type="email" autocomplete="email" placeholder="你的 Supabase 登录邮箱" required />
          </label>
          <label>
            <span>Password</span>
            <input
              id="loginPassword"
              type="password"
              autocomplete="current-password"
              placeholder="你的登录密码"
              required
            />
          </label>
          <button class="primary-button" type="submit">登录</button>
          <p class="post-meta" id="authMessage"></p>
        </form>
      </section>

      <section class="wrap editor-section creator-only hidden" id="editor">
        <form class="editor-form" id="postForm">
          <div class="rich-editor">
            <div class="toolbar" aria-label="富文本工具栏">
              <button type="button" data-command="bold" aria-label="加粗"><strong>B</strong></button>
              <button type="button" data-command="italic" aria-label="斜体"><em>I</em></button>
              <button type="button" data-command="formatBlock" data-value="h2">H2</button>
              <button type="button" data-command="formatBlock" data-value="blockquote">“”</button>
              <button type="button" data-command="insertUnorderedList">•</button>
              <button type="button" data-command="createLink">链接</button>
              <select id="fontSizeSelect" aria-label="调整字号">
                <option value="">字号</option>
                <option value="14px">小</option>
                <option value="16px">正文</option>
                <option value="18px">中</option>
                <option value="22px">大</option>
                <option value="28px">特大</option>
              </select>
              <button
                class="swatch"
                type="button"
                data-inline-style="color"
                data-value="#d97706"
                style="--swatch: #d97706"
                aria-label="黄色文字"
              ></button>
              <button
                class="swatch"
                type="button"
                data-inline-style="color"
                data-value="#15803d"
                style="--swatch: #15803d"
                aria-label="绿色文字"
              ></button>
              <button
                class="swatch"
                type="button"
                data-inline-style="color"
                data-value="#2563eb"
                style="--swatch: #2563eb"
                aria-label="蓝色文字"
              ></button>
              <button
                class="swatch"
                type="button"
                data-inline-style="color"
                data-value="#b42318"
                style="--swatch: #b42318"
                aria-label="红色文字"
              ></button>
              <button
                class="swatch"
                type="button"
                data-inline-style="color"
                data-value="#25636a"
                style="--swatch: #25636a"
                aria-label="青色文字"
              ></button>
              <button type="button" id="clearFormatButton">清除格式</button>
            </div>
            <div
              class="editable"
              id="postContent"
              contenteditable="true"
              role="textbox"
              aria-multiline="true"
              data-placeholder="在这里写正文。可以加粗、斜体、标题、引用、列表和链接。"
            ></div>
          </div>

          <div class="form-actions">
            <button class="primary-button" type="submit">发布文章</button>
            <button class="ghost-button" id="resetButton" type="button">清空</button>
          </div>
          <p class="post-meta" id="publishMessage"></p>
        </form>
      </section>

      <section class="wrap layout creator-only hidden">
        <aside class="post-list-panel" aria-label="文章列表">
          <div class="panel-head">
            <h2>文章</h2>
            <button class="text-button" id="seedButton" type="button">载入示例</button>
          </div>
          <div class="post-list" id="postList"></div>
        </aside>

        <article class="reader" id="reader">
          <div class="empty-state">
            <h2>还没有文章</h2>
            <p>从上方发布第一篇内容。</p>
          </div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <div class="wrap">Leo Wang's Blog · creator console</div>
    </footer>

    <button class="back-to-top" id="backToTopButton" type="button" aria-label="回到顶部" title="回到顶部">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 19V5"></path>
        <path d="m5 12 7-7 7 7"></path>
      </svg>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
