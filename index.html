<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leo Wang's Blog</title>
    <link rel="alternate" type="application/rss+xml" title="Leo Wang's Blog RSS" href="rss.xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-role="public">
    <header class="site-header">
      <div class="wrap header-inner">
        <div class="header-content">
          <a class="brand" href="#home" aria-label="返回首页">Leo Wang's Blog</a>
          <p class="header-subtitle">Software Engineer, Builder, Thinker</p>
          <nav class="nav" aria-label="主导航">
            <a class="nav-pill" href="#home">Articles</a>
            <button class="nav-pill" id="emailSubscribeButton" type="button">Email</button>
            <a class="nav-pill" href="rss.xml" target="_blank" rel="noopener noreferrer">RSS</a>
            <a class="nav-pill" href="https://github.com/testerwm" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a class="nav-pill" href="https://x.com/Davie_ming" target="_blank" rel="noopener noreferrer">X</a>
          </nav>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换深浅色主题">暗色</button>
      </div>
    </header>

    <dialog class="subscribe-dialog" id="subscribeDialog" aria-labelledby="subscribeTitle">
      <form class="subscribe-card" id="subscribeForm" method="dialog">
        <div class="subscribe-head">
          <h2 id="subscribeTitle">Email</h2>
          <button class="icon-button" id="closeSubscribeButton" type="button" aria-label="关闭订阅窗口">×</button>
        </div>
        <p>留下邮箱，后续有新文章时接收更新。</p>
        <label>
          <span>Email</span>
          <input id="subscriberEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
        </label>
        <div class="form-actions">
          <button class="primary-button" type="submit">订阅</button>
        </div>
        <p class="post-meta" id="subscribeMessage"></p>
      </form>
    </dialog>

    <main>
      <section class="wrap layout" id="home">
        <aside class="post-list-panel" aria-label="文章列表">
          <div class="panel-head">
            <h2>文章</h2>
          </div>
          <div class="post-list" id="postList"></div>
        </aside>

        <article class="reader" id="reader">
          <div class="empty-state">
            <h2>还没有文章</h2>
            <p>作者还没有发布内容。</p>
          </div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <div class="wrap footer-inner">
        <span>Leo Wang's Blog</span>
      </div>
    </footer>

    <button class="back-to-top" id="backToTopButton" type="button" aria-label="回到顶部" title="回到顶部">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 19V5"></path>
        <path d="m5 12 7-7 7 7"></path>
      </svg>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
